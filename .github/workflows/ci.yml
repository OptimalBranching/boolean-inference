name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: fmt + build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@nextest

      - name: Format check
        run: cargo fmt --all --check

      - name: Build (all targets)
        run: cargo build --all-targets

      # Debug on purpose: debug builds enable `debug_assert!`, which guards the
      # solver's search invariants — a release-only CI would hide those. The
      # correctness tests (oracle differential, factoring solve+decode) are fast.
      # nextest is the modern runner.
      - name: Test
        run: cargo nextest run
