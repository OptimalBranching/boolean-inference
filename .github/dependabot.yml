version: 2
updates:
  # Rust crates (crates.io). The one git dependency, optimal-branching-core, is
  # pinned to a commit and is not tracked here — bump it manually in Cargo.toml.
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      cargo-minor-patch:
        update-types: ["minor", "patch"]

  # GitHub Actions pinned in .github/workflows/*.yml.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types: ["minor", "patch"]
