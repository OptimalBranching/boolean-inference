[package]
name = "boolean-inference"
version = "0.1.0"
edition = "2021"
license = "MIT"

[dependencies]
# Git dep on the user's PRIVATE miso-rs repo, pinned to the `main` branch.
# Cargo resolves the `optimal-branching-core` workspace member by name out of the repo.
optimal-branching-core = { git = "https://github.com/CodingThrust/miso-rs.git", branch = "main" }
rustc-hash = "2"
smallvec = "1"
wide = "0.7"
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rayon = { version = "1", optional = true }

[features]
default = []
parallel = ["dep:rayon"]

[dev-dependencies]
criterion = { version = "0.6", features = ["html_reports"] }

# Optimized like release but keeps debug symbols for the sampling profiler
# (samply / cargo-flamegraph). Build with: cargo build --profile profiling ...
[profile.profiling]
inherits = "release"
debug = true
