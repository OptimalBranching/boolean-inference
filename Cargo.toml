[package]
name = "boolean-inference"
version = "0.1.0"
edition = "2021"
license = "MIT"

[dependencies]
# Public OptimalBranching/optimal-branching crate (published as `optimal-branching`),
# aliased via `package` to the `optimal_branching_core` name our code imports.
# Pinned to the greedymerge size_reduction memoization branch (bit-identical to
# main; removes the redundant re-scoring our GreedyMerge path triggered). Drop
# the `branch` once it lands on main.
optimal-branching-core = { git = "https://github.com/OptimalBranching/optimal-branching.git", package = "optimal-branching", branch = "greedymerge-memoize-size-reduction" }
rustc-hash = "2"
smallvec = "1"
wide = "1.5"
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rayon = { version = "1", optional = true }

[features]
default = []
parallel = ["dep:rayon"]

[dev-dependencies]
criterion = { version = "0.8", features = ["html_reports"] }

# Optimized like release but keeps debug symbols for the sampling profiler
# (samply / cargo-flamegraph). Build with: cargo build --profile profiling ...
[profile.profiling]
inherits = "release"
debug = true
