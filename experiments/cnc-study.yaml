methods:
  - id: bi-region
    role: project
    description: Region-guided branching with the validation-selected static unfixed-variable residual budget.
    partition_command: target/release/examples/gen_cubes <instance.json> <out.cubes> most 128 --cutoff unfixed:<selected-budget> --frontier-only
    conquer_command: python3 benchmarks/conquer_cubes.py <instance.cnf> <out.cubes> --out <raw.csv> --contract-lock experiments/cnc-study.lock
    configuration: MostOccurrence selector with max_rows=128; GreedyMerge branch solver; selected-budget frozen before held-out access; Kissat conquerer.
    artifact_status: pinned_binary
  - id: kissat-direct
    role: direct_solve_reference
    description: Solve the complete comment-free DIMACS encoding directly with the same Kissat executable used for conquer.
    partition_command: No partition step; cubing cost is exactly zero.
    conquer_command: kissat -q --relaxed <instance.cnf>
    configuration: One process, one worker allocation, identical memory and end-to-end timeout.
    artifact_status: reproducible_from_source
  - id: bi-binmost
    role: cheap_branching_control
    description: Binary-occurrence branching control with the same cutoff, output format, and conquerer as the project method.
    partition_command: target/release/examples/gen_cubes <instance.json> <out.cubes> binmost 128 --cutoff unfixed:<selected-budget> --frontier-only
    conquer_command: python3 benchmarks/conquer_cubes.py <instance.cnf> <out.cubes> --out <raw.csv> --contract-lock experiments/cnc-study.lock
    configuration: BinaryOccurrence selector; GreedyMerge branch solver; project method's selected budget; Kissat conquerer.
    artifact_status: pinned_binary
  - id: march-cu
    role: partitioning_baseline
    description: Reproducible lookahead Cube-and-Conquer baseline using march_cu for partitioning.
    partition_command: march_cu <instance.cnf> -o <out.cubes> -n <validation-selected-target>
    conquer_command: python3 benchmarks/conquer_cubes.py <instance.cnf> <out.cubes> --out <raw.csv> --contract-lock experiments/cnc-study.lock
    configuration: Default lookahead; -n selected on validation to match the project method's median cube count; Kissat conquerer.
    artifact_status: pinned_binary
  - id: proofix
    role: partitioning_baseline
    description: Static proof-prefix partitioning baseline from Proofix SAT 2025.
    partition_command: python3 proofix.py --cnf <instance.cnf> --cube-size <validation-selected-depth> --cutoff 100000 --log <log> --icnf <out.cubes> --tmp-dir <tmp>
    conquer_command: python3 benchmarks/conquer_cubes.py <instance.cnf> <out.cubes> --out <raw.csv> --contract-lock experiments/cnc-study.lock
    configuration: Depth selected on validation to match median cube count; cutoff fixed at 100000; CaDiCaL proof support; Kissat conquerer.
    artifact_status: reproducible_from_source

comparisons:
  - id: region-vs-direct
    left: bi-region
    right: kissat-direct
    question: Does partitioning pay for its own cubing cost in end-to-end execution?
    controlled_factors: [instances, Kissat executable, worker allocation, memory limit, end-to-end timeout]
  - id: region-vs-cheap
    left: bi-region
    right: bi-binmost
    question: Does structural region selection improve uniformity beyond cheap occurrence branching?
    controlled_factors: [instances, cutoff budget, branch solver, conquerer, workers, scheduler, seeds]
  - id: region-vs-march
    left: bi-region
    right: march-cu
    question: How does region-guided cubing compare with standard lookahead partitioning at matched granularity?
    controlled_factors: [instances, validation-only granularity matching, conquerer, workers, scheduler, seeds]
  - id: region-vs-proofix
    left: bi-region
    right: proofix
    question: How does dynamic region-guided cubing compare with a static proof-prefix partition?
    controlled_factors: [instances, validation-only granularity matching, conquerer, workers, scheduler, seeds]

provenance:
  run_capture: [contract_digest, executable_sha256, argv, environment, hostname, operating_system, cpu_model, start_time_utc]
  tools:
    - id: boolean-inference
      version: 0.1.0
      source: https://github.com/OptimalBranching/boolean-inference
      source_revision: 68898f284cb6f7563578622cf4f1868654119c3c
      build: cargo build --release --examples --locked
      executable: target/release/examples/gen_cubes
      executable_digest_policy: Run records must contain SHA-256; the preregistration reference artifact is cf9c25c0dd66628216fbf44c8633c24219f972d3e8255f613fd3643d30bc7d27.
    - id: kissat
      version: 4.0.4
      source: https://github.com/arminbiere/kissat
      source_revision: Release-reported version 4.0.4; build recipe is cnc-tools/Makefile.
      build: make -C cnc-tools bin/kissat
      executable: cnc-tools/bin/kissat
      executable_digest_policy: Required run digest; reference artifact 66d5082d9d0b5d5cb555e6f0620af1cf93da0fae2376d5b0ac546a68201f36a0.
    - id: march-cu
      version: artifact-sha256-c20e21b29f39a95c011f92fe9db154a7f646c79f48adeb0893866ff18dcfbbe8
      source: https://github.com/marijnheule/CnC
      source_revision: Upstream executable exposes no version; the pinned binary digest is authoritative for v1.
      build: make -C cnc-tools bin/march_cu
      executable: cnc-tools/bin/march_cu
      executable_digest_policy: Must equal c20e21b29f39a95c011f92fe9db154a7f646c79f48adeb0893866ff18dcfbbe8.
    - id: proofix
      version: sat-2025-a3caacb
      source: https://github.com/zaxioms0/proofix
      source_revision: a3caacbcadf0ac83045b2772ae17976e3e71af6d
      build: git clone and checkout the recorded revision; Python 3.13 or later.
      executable: cnc-tools/proofix/proofix.py
      executable_digest_policy: Record the script SHA-256 and repository revision in every Proofix run.
    - id: cadical
      version: 3.0.0
      source: https://github.com/arminbiere/cadical
      source_revision: Release-reported version 3.0.0; build recipe is cnc-tools/Makefile.
      build: make -C cnc-tools bin/cadical
      executable: cnc-tools/bin/cadical
      executable_digest_policy: Required for Proofix runs; reference artifact 1dfaf82af98464b11482b1684a7f1933f3a2f4ddfe352b1d0eb656ee9ddb513d.

tuning:
  budget:
    trials_per_method: 20
    wall_time_seconds_per_method: 14400
  visible_splits: [training, validation]
  available_information:
    - Training and validation instance contents, hashes, solver outcomes, and all declared metrics.
    - Aggregate and per-instance records from training and validation only.
    - Executable profiling on training instances within the declared budget.
  forbidden_information:
    - Held-out instance contents, solver outcomes, timing, cube counts, logs, and partial runs.
    - Any statistic aggregated across a held-out instance.
  selection_rule: Choose the configuration minimizing validation median end_to_end_cost; break ties within one percent by lower validation P95 makespan, then lexicographically by serialized configuration.

execution:
  workers: 16
  scheduler:
    policy: One persistent process pool per run; workers request the next cube after completing their current cube.
    queue_discipline: Cubes are queued in their emitted order; no observed difficulty signal may reorder the queue.
    preemption: false
  seeds: [104729, 130363, 155921, 181081, 206369]
  repetitions: 5
  ordering: Method order is rotated by seed; instance order is ascending by family, factor_bits, and index; all methods for an instance complete before the next instance.
  limits:
    memory_mb_per_worker: 8192
    cubing_timeout_seconds: 3600
    conquer_timeout_seconds_per_cube: 600
    end_to_end_timeout_seconds: 14400

metrics:
  clock: CLOCK_MONOTONIC wall time for elapsed phases and process CPU user+system time for work; nanosecond source values stored before conversion to seconds.
  definitions:
    - id: cubing_cost
      unit: cpu_seconds
      definition: Sum of user and system CPU seconds consumed by the partitioner and its children from process start through the final durable cube record; zero for direct solve.
      aggregation: Sum within a run; report median and interquartile range over repetitions.
      censoring: Retain observed cost and mark censored when cubing times out, crashes, or is cancelled.
    - id: conquer_work
      unit: cpu_seconds
      definition: Sum of user and system CPU seconds for every conquer attempt launched in the run, including completed, failed, timed-out, and SAT-termination-in-flight attempts.
      aggregation: Sum within a run; report median, interquartile range, P95, and P99 over repetitions as applicable.
      censoring: Lower bound when any conquer attempt is censored; never impute unlaunched cubes.
    - id: makespan
      unit: wall_seconds
      definition: Elapsed monotonic time from the first conquer task becoming runnable until all required conquer work finishes or the run reaches a terminal policy event.
      aggregation: One value per run; report median, interquartile range, and P95 over repetitions.
      censoring: Lower bound for cancelled SAT siblings; right-censored at timeout for unresolved runs.
    - id: end_to_end_cost
      unit: wall_seconds
      definition: Elapsed monotonic time from partitioner or direct-solver launch through final status and durable raw-record flush, including cubing, scheduling, conquer, and cancellation overhead.
      aggregation: One value per run; report median, interquartile range, and P95 over repetitions.
      censoring: Right-censored at the declared end-to-end timeout for unresolved runs.
    - id: cube_count
      unit: cubes
      definition: Number of non-refuted frontier cubes handed to the conquer scheduler.
      aggregation: Exact per run; report median and range over repetitions.
      censoring: Mark partial and do not compare granularity if cubing is censored.
    - id: conflicts
      unit: solver_conflicts
      definition: Sum of conflicts reported by the pinned Kissat executable across every launched conquer attempt.
      aggregation: Sum within a run and distribution across cubes; report median, P95, and P99.
      censoring: Lower bound if any attempt lacks a final solver statistics record.
    - id: cube_time_cv
      unit: ratio
      definition: Population standard deviation divided by arithmetic mean of completed per-cube conquer wall times; undefined when fewer than two positive completed times exist.
      aggregation: One value per run; report median and interquartile range over repetitions.
      censoring: Compute only on completed cubes and report completed fraction beside it.
    - id: cutoff_spearman
      unit: rank_correlation
      definition: Spearman rank correlation between sigma_dec times sigma_all and realized per-cube conquer time for completed cubes.
      aggregation: One value per run; report median and bootstrap confidence interval over repetitions.
      censoring: Undefined when either rank vector has zero variance or fewer than three completed pairs exist.

outcomes:
  allowed_statuses: [sat, unsat, unknown, crash, cancelled, timeout]
  sat_early_termination: On the first validated SAT witness, stop launching cubes, request cancellation of in-flight siblings, retain their observed work, and mark unlaunched siblings cancelled_by_sat rather than solved.
  unsat: Report UNSAT only after every non-refuted frontier cube returns UNSAT and no cube is unknown, crashed, cancelled, or timed out.
  unknown: Preserve all observations, report UNKNOWN, and exclude the run from solved-only summaries while retaining it in completion and resource-accounting tables.
  crash: Preserve stdout, stderr, exit code, signal, and observed resource use; report crash and do not retry outside the fixed repetition schedule.
  cancellation: Record the triggering event and observed resource use for every cancelled process; cancellations never count as zero work.
  censoring: Store censoring reason, bound direction, cutoff time, and completed fraction; primary summaries never substitute timeout values as completed observations.

outputs:
  raw_records:
    format: csv
    one_record_per: One run summary plus one linked child record per cubing phase and conquer attempt.
    required_fields: [schema_version, contract_digest, run_id, parent_run_id, benchmark_family, instance_id, instance_sha256, split, method_id, configuration, tool_versions, executable_sha256, workers, scheduler, seed, repetition, order_index, memory_limit_mb, timeout_seconds, start_time_utc, elapsed_wall_seconds, cpu_seconds, status, censoring, stdout_path, stderr_path]
    metrics: [cubing_cost, conquer_work, makespan, end_to_end_cost, cube_count, conflicts, cube_time_cv, cutoff_spearman]
  tables:
    - id: primary-cost
      description: Per-method and per-split completion, status, cubing, conquer, makespan, and end-to-end summaries with censored counts.
      metrics: [cubing_cost, conquer_work, makespan, end_to_end_cost]
    - id: uniformity
      description: Cube-count, conflict-distribution, and per-cube timing-uniformity summaries by method and family.
      metrics: [cube_count, conflicts, cube_time_cv]
  figures:
    - id: cost-by-method
      description: End-to-end and makespan distributions with censored observations visibly distinguished.
      metrics: [makespan, end_to_end_cost]
    - id: proxy-calibration
      description: Cutoff proxy against realized conquer difficulty, faceted by method and split.
      metrics: [conflicts, cutoff_spearman]
    - id: cube-uniformity
      description: Per-cube time distributions and coefficient of variation for every partitioning method.
      metrics: [cube_count, cube_time_cv]
  negative_controls:
    - id: split-leakage-audit
      description: Deliberately place one instance in validation and held_out and run the contract auditor.
      expected_result: Non-zero exit with FAIL split; no experiment process starts.
    - id: lock-tamper-audit
      description: Change one contract value without updating the lock digest.
      expected_result: Non-zero exit with FAIL freeze; no experiment process starts.
    - id: method-order-rotation
      description: Confirm that rotating method order by seed does not change instance hashes, configurations, or worker allocation.
      expected_result: All controlled fields remain identical and only order_index changes.

exclusions:
  - artifact: march_cu semantic version and immutable upstream source revision
    reason: The available march_cu executable exposes no version and the existing acquisition recipe tracked upstream HEAD rather than an immutable commit.
    consequence: v1 identifies march_cu by executable SHA-256; rebuilding a different digest creates a new protocol version and cannot be pooled with v1.
  - artifact: Proofix cutoff-proxy correlation
    reason: Proofix fixes every cube at the selected static depth, so sigma_dec has zero variance by construction.
    consequence: cutoff_spearman is reported as undefined for Proofix rather than zero and is excluded from proxy-effect aggregation.
  - artifact: systems without reproducible public artifacts or a common DIMACS cube interface
    reason: No auditable executable or conversion path was available at freeze time under the declared tuning budget.
    consequence: They are listed as unavailable rather than silently treated as failed baselines; no performance claim is made about them.
