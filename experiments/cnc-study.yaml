# Reviewer-auditable preregistration for the factoring Cube-and-Conquer study.
# Any semantic change requires a version bump and a regenerated lock file.
protocol:
  id: factoring-cnc-v1
  version: 1
  status: frozen
  questions:
    - Does region-guided cubing reduce end-to-end cost relative to direct solving?
    - Does region-guided cubing produce more uniform conquer work than cheap branching and reproducible partitioning baselines?
    - Does the declared cutoff proxy predict realized per-cube difficulty?
  change_policy: After held-out access, any change to inputs, methods, tuning, resources, accounting, or analysis creates a new protocol version; v1 results are never overwritten.

benchmarks:
  held_out_policy: Instance hashes in held_out remain inaccessible to method selection and cutoff tuning until every tuning choice and executable digest has been recorded against this contract digest.
