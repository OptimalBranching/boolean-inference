schema_version: 1
study_id: array-ripple-hard-unsat-cnc-v1
issue: 51
architecture: array-ripple
semantic_task: unsigned-factoring
expected_outcome: unsat

widths:
  - product_width: 64
    factor_input_width: 32
    calibration:
      count: 3
      seed: 202607196401
    held_out:
      count: 10
      seed: 202607196402
  - product_width: 72
    factor_input_width: 36
    calibration:
      count: 3
      seed: 202607197201
    held_out:
      count: 10
      seed: 202607197202
  - product_width: 80
    factor_input_width: 40
    calibration:
      count: 3
      seed: 202607198001
    held_out:
      count: 10
      seed: 202607198002

frontier_bands:
  low:
    center_cubes: 16384
    accepted_ratio: [0.75, 1.25]
  medium:
    center_cubes: 65536
    accepted_ratio: [0.75, 1.25]
  high:
    center_cubes: 262144
    accepted_ratio: [0.75, 1.25]

methods:
  monolithic-kissat:
    budgets: ["none"]
    input: global-tseitin-cnf
  march-cu-dynamic:
    budgets: [dynamic-default]
    input: global-tseitin-cnf
    cutoff_policy: upstream-default-dynamic
  region-cc:
    budgets: [low, medium, high]
    input: structured-circuitsat
    selector: region
    max_rows: 512
    cutoff_policy: calibration-frozen-cc-difficulty
  structure-blind-cc:
    budgets: [low, medium, high]
    input: structured-circuitsat
    selector: structure-blind
    max_rows: 512
    cutoff_policy: calibration-frozen-cc-difficulty

limits_seconds:
  monolithic: 600
  cubing: 7200
  per_cube_conquer: 1800

scheduling:
  measured_workers: 32
  lpt_replay_workers: [32, 128, 512]
  completion_policy: complete-all-cubes

calibration:
  unit: product-width-method-budget
  selection_loss: median-absolute-log2-frontier-error
  held_out_recalibration: forbidden
  center_revision_policy: calibration-only-before-held-out

statistics:
  unit: held-out-instance
  paired_geometric_mean: true
  bootstrap:
    samples: 10000
    confidence: 0.95
    seed: 2026071951
  budget_adjustment:
    x: log2-frontier-size
    y: log-metric
    interpolation: piecewise-linear
    extrapolation: forbidden
    common_grid: overlap-low-geometric-mid-overlap-high
  censored_policy: report-separately-no-finite-imputation

artifact_policy:
  raw_directory: artifacts/cnc-hard-regime
  git_payload:
    - contract
    - sha256-manifest
    - aggregate-statistics
    - primary-table
    - report
  tool_identity: version-source-revision-command-and-executable-sha256

tool_sources:
  kissat:
    repository: https://github.com/arminbiere/kissat.git
    revision: 8af8e56f174b778aef3aa45af9f739b2a5f492c2
  march_cu:
    repository: https://github.com/marijnheule/CnC.git
    revision: 705b60c6491ef2b61988b3ce6ac674be1b90571d
