  passes: [proc, flatten, techmap, simplemap, opt_clean]

validation:
  manifest_hashes: pass
  multiplication_witnesses:
    result: pass
    checked_instances: 24
    policy: Simulate each raw architecture with the private factors and require the exact public target.
  kissat_smoke:
    solver: Kissat 4.0.4
    timeout_seconds: 5
    selection: First target for every width and architecture (12 instances).
    sat: 1
    timeout: 11
    interpretation: Timeouts are retained as pilot difficulty evidence, not treated as incorrect instances.

limits:
